version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediagrab-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - ALLOWED_ORIGINS=http://localhost:3000
      - DOWNLOADS_DIR=/app/downloads
      - FILE_TTL_MINUTES=60
      - RATE_LIMIT_MAX=100
      - CONVERT_RATE_LIMIT_MAX=10
    volumes:
      - downloads_data:/app/downloads
      - ytdlp_bin:/app/bin
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediagrab-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  downloads_data:
  ytdlp_bin:
